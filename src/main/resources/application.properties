# Spring Boot Application Configuration
spring.application.name=LabTrack UM

# Server Configuration
server.port=8080
server.servlet.context-path=/

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/labtrack_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Herby!123

# JPA/Hibernate Configuration for MySQL (dialect auto-detected)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# Ensure Hibernate creates tables on startup and quotes identifiers (handles reserved keywords)
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Disable default security user (we use custom auth)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Logging (less console noise; set DEBUG for troubleshooting)
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.org.springframework.boot=INFO
logging.level.com.um.labtrack=INFO
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.org.springframework.web.servlet.handler=ERROR
